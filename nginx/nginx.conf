events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  upstream api_gateway {
    server api-gateway:3000;
  }

  upstream websocket_server {
    server websocket-server:3003;
  }

  upstream app_estudiante {
    server app-estudiante:5173;
  }

  upstream app_conductor {
    server app-conductor:5174;
  }

  upstream dashboard_admin {
    server dashboard-admin:5175;
  }

  # Todo el tráfico HTTP (puerto 80) se redirige a HTTPS (puerto 443).
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # Servidor principal sobre TLS. Al servirse todo bajo HTTPS, las conexiones
  # Socket.io (/socket.io/) heredan WSS y los fetch() relativos heredan HTTPS.
  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /api/ {
      proxy_pass         http://api_gateway;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /socket.io/ {
      proxy_pass         http://websocket_server;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    location /estudiante/ {
      proxy_pass       http://app_estudiante/estudiante/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /conductor/ {
      proxy_pass       http://app_conductor/conductor/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /admin/ {
      proxy_pass       http://dashboard_admin/admin/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location / {
      return 301 $scheme://$http_host/estudiante/;
    }
  }
}