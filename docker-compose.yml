services:
  nginx:
    build:
      context: ./nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - app-estudiante
      - app-conductor
      - dashboard-admin
      - api-gateway
      - websocket-server
    networks:
      - uniroute-network

  api-gateway:
    build:
      context: .
      dockerfile: packages/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - QR_HMAC_SECRET=${QR_HMAC_SECRET}
    depends_on:
      - usuarios-service
      - rutas-service
      - despachos-service
    networks:
      - uniroute-network

  usuarios-service:
    build:
      context: .
      dockerfile: packages/usuarios-service/Dockerfile
    expose:
      - "3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - QR_HMAC_SECRET=${QR_HMAC_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - uniroute-network

  rutas-service:
    build:
      context: .
      dockerfile: packages/rutas-service/Dockerfile
    expose:
      - "3002"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uniroute-network

  despachos-service:
    build:
      context: .
      dockerfile: packages/despachos-service/Dockerfile
    expose:
      - "3004"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - QR_HMAC_SECRET=${QR_HMAC_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - uniroute-network

  websocket-server:
    build:
      context: .
      dockerfile: packages/websocket-server/Dockerfile
    ports:
      - "3003:3003"
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - uniroute-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uniroute-network

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/rutas-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uniroute-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uniroute-network

  app-estudiante:
    build:
      context: packages/app-estudiante
      dockerfile: Dockerfile
    expose:
      - "5173"
    networks:
      - uniroute-network

  app-conductor:
    build:
      context: packages/app-conductor
      dockerfile: Dockerfile
    expose:
      - "5174"
    networks:
      - uniroute-network

  dashboard-admin:
    build:
      context: packages/dashboard-admin
      dockerfile: Dockerfile
    expose:
      - "5175"
    networks:
      - uniroute-network

volumes:
  postgres_data:

networks:
  uniroute-network:
    driver: bridge
